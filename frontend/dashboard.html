<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="p-4">

<div class="container">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 id="titulo">Dashboard</h2>
        <button class="btn btn-danger" onclick="logout()">Salir</button>
    </div>

    <div class="mb-3">
        <button id="btnDocentes" class="btn btn-primary me-2" onclick="verDocentes()">Ver Docentes</button>
        <button class="btn btn-success" onclick="abrirModal()">Nuevo Docente</button>
    </div>

    <div class="mb-3">
        <input type="text" id="buscador" class="form-control" placeholder="Buscar docente..." onkeyup="filtrar()">
    </div>

    <div id="tabla"></div>

</div>

<!-- MODAL NUEVO DOCENTE -->
<div class="modal fade" id="modalDocente" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Nuevo Docente</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body row g-2">

        <div class="col-md-4">
            <input type="text" id="rrhh_id" class="form-control" placeholder="RRHH ID">
        </div>

        <div class="col-md-4">
            <input type="text" id="apellido" class="form-control" placeholder="Apellido">
        </div>

        <div class="col-md-4">
            <input type="text" id="nombre" class="form-control" placeholder="Nombre">
        </div>

        <div class="col-md-4">
            <label>Fecha Nacimiento</label>
            <input type="date" id="fechaNac" class="form-control">
        </div>

        <div class="col-md-4">
            <input type="text" id="dni" class="form-control" placeholder="DNI">
        </div>

        <div class="col-md-4">
            <input type="text" id="cuil" class="form-control" placeholder="CUIL">
        </div>

        <div class="col-md-4">
            <input type="text" id="fichaCensal" class="form-control" placeholder="Ficha Censal">
        </div>

        <div class="col-md-4">
            <input type="email" id="email" class="form-control" placeholder="Email">
        </div>

        <div class="col-md-4">
            <input type="text" id="telefono" class="form-control" placeholder="Teléfono">
        </div>

        <div class="col-md-12">
            <input type="text" id="direccion" class="form-control" placeholder="Dirección">
        </div>

        <div class="col-md-6">
            <label>Fecha Ingreso</label>
            <input type="date" id="fecha_ingreso" class="form-control">
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-primary" onclick="guardarDocente()">Guardar</button>
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
      </div>

    </div>
  </div>
</div>

<script>

let docentesGlobal = [];
let visible = false;
let modal;

// ============================
// INICIO
// ============================

window.addEventListener("DOMContentLoaded", () => {
    cargarUsuario();
    modal = new bootstrap.Modal(document.getElementById('modalDocente'));
});

// ============================
// VALIDAR SESIÓN
// ============================

async function cargarUsuario(){
    const res = await fetch("/usuarios/me",{ credentials:"include" });

    if(!res.ok){
        window.location.href = "login.html";
        return;
    }

    const user = await res.json();
    document.getElementById("titulo").innerText = "Bienvenido/a " + user.nombre;
}

// ============================
// LOGOUT
// ============================

async function logout(){
    await fetch("/usuarios/logout",{
        method:"POST",
        credentials:"include"
    });

    window.location.href = "login.html";
}

// ============================
// LISTAR DOCENTES
// ============================

async function verDocentes(){

    const btn = document.getElementById("btnDocentes");

    if(!visible){

        const res = await fetch("/docentes",{ credentials:"include" });

        if(!res.ok){
            alert("No tiene permiso para ver docentes");
            return;
        }

        docentesGlobal = await res.json();
        renderTabla(docentesGlobal);

        visible = true;
        btn.innerText = "Ocultar Docentes";

    }else{

        document.getElementById("tabla").innerHTML = "";
        visible = false;
        btn.innerText = "Ver Docentes";
    }
}

// ============================
// RENDER TABLA
// ============================

function renderTabla(data){

    if(data.length === 0){
        document.getElementById("tabla").innerHTML = "<p>No hay docentes.</p>";
        return;
    }

    let html = `
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Apellido</th>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
    `;

    data.forEach(d=>{
        html += `
            <tr>
                <td>${d.apellido}</td>
                <td>${d.nombre}</td>
                <td>${d.email ?? ''}</td>
                <td>${d.estado}</td>
            </tr>
        `;
    });

    html += "</tbody></table>";

    document.getElementById("tabla").innerHTML = html;
}

// ============================
// FILTRO INTELIGENTE
// ============================

async function filtrar(){

    const texto = document.getElementById("buscador").value.toLowerCase();

    if(!visible){
        const res = await fetch("/docentes",{ credentials:"include" });

        if(!res.ok){
            return;
        }

        docentesGlobal = await res.json();
        visible = true;
        document.getElementById("btnDocentes").innerText = "Ocultar Docentes";
    }

    const filtrados = docentesGlobal.filter(d =>
        d.apellido.toLowerCase().includes(texto) ||
        d.nombre.toLowerCase().includes(texto)
    );

    renderTabla(filtrados);
}

// ============================
// MODAL
// ============================

function abrirModal(){
    document.querySelectorAll("#modalDocente input").forEach(i=>i.value="");
    modal.show();
}

// ============================
// GUARDAR DOCENTE
// ============================

async function guardarDocente(){

    const data = {
        rrhh_id: document.getElementById("rrhh_id").value,
        apellido: document.getElementById("apellido").value,
        nombre: document.getElementById("nombre").value,
        fechaNac: document.getElementById("fechaNac").value,
        dni: document.getElementById("dni").value,
        cuil: document.getElementById("cuil").value,
        fichaCensal: document.getElementById("fichaCensal").value,
        email: document.getElementById("email").value,
        direccion: document.getElementById("direccion").value,
        telefono: document.getElementById("telefono").value,
        fecha_ingreso: document.getElementById("fecha_ingreso").value
    };

    const res = await fetch("/docentes",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body: JSON.stringify(data)
    });

    if(!res.ok){
        alert("Error al crear docente");
        return;
    }

    modal.hide();

    if(visible){
        visible = false;
        verDocentes();
    }
}

</script>

</body>
</html>
