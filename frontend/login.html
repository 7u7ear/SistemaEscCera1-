<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card p-4" style="width: 350px;">
    <h3 class="text-center mb-3">Ingreso</h3>

    <input type="text" id="username" class="form-control mb-2" placeholder="Usuario">
    <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">

    <button class="btn btn-primary w-100" onclick="login()">Ingresar</button>

    <div id="msg" class="text-danger mt-2"></div>
</div>

<script>
async function login(){
    const res = await fetch("http://localhost:3000/usuarios/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    credentials:"include",
    body: JSON.stringify({
        username: username.value,
        password: password.value
    })
});

console.log("Status:", res.status);

const data = await res.json();

    if(res.ok){
        window.location.href = "dashboard.html";
    }else{
        msg.innerText = data;
    }
}
</script>

</body>
</html>
